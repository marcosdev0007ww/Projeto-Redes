version: '3.8'

services:
  servidor-web:
    image: nginx:alpine
    ports:
      - "8080:80"
      - "8443:443"
    volumes:
      - ./html:/usr/share/nginx/html
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - ./certs:/etc/nginx/certs
    networks:
      - rede-lab

  cliente-curl:
    image: curlimages/curl
    command: sleep infinity # Fica dormindo, esperando você dar ordens
    networks:
      - rede-lab

networks:
  rede-lab:
    driver: bridge